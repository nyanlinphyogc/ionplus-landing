  }
  .vignette{
    background:radial-gradient(ellipse 85% 75% at 50% 42%,rgba(255,230,120,.35) 0%,rgba(245,166,35,.12) 55%,rgba(196,124,12,.5) 100%);
  }
  .frame-top,.frame-bottom{position:fixed;left:0;right:0;height:6px;background:var(--blue);z-index:20}
  .frame-top{top:0}.frame-bottom{bottom:0}
  .content{
    position:relative;z-index:10;width:100%;max-width:720px;margin:0 auto;
    padding:64px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;
  }
  .kicker{
    display:inline-flex;align-items:center;background:var(--ink);color:var(--yellow);
    font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:.22em;
    font-size:.7rem;padding:8px 20px;margin-bottom:40px;border-radius:4px;
    transform:skewX(-8deg);box-shadow:0 10px 20px rgba(10,46,79,.25);
  }
  .kicker span{display:inline-block;transform:skewX(8deg)}
  .logo-wrap{
    position:relative;width:clamp(220px,52vw,360px);aspect-ratio:1;margin-bottom:24px;
  }
  .logo-wrap img{
    width:100%;height:100%;object-fit:contain;
    -webkit-mask-image:radial-gradient(ellipse 72% 72% at 50% 50%,#000 60%,transparent 100%);
    mask-image:radial-gradient(ellipse 72% 72% at 50% 50%,#000 60%,transparent 100%);
  }
  .slogan{
    font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:.05em;
    margin-bottom:48px;font-size:clamp(.95rem,3.2vw,1.35rem);
  }
  h1{
    font-weight:900;font-style:italic;text-transform:uppercase;line-height:.92;
    margin-bottom:32px;font-size:clamp(2.6rem,9vw,5rem);letter-spacing:-.025em;
    text-shadow:0 2px 0 rgba(255,255,255,.55),0 8px 24px rgba(214,137,16,.35);
    text-wrap:balance;
  }
  h1 .big{color:var(--blue)}
  .divider{display:flex;align-items:center;gap:8px;margin-bottom:40px}
  .divider .bar{height:3px;width:40px;background:var(--blue)}
  .divider .dot{height:7px;width:7px;transform:rotate(45deg);background:var(--blue)}
  .sub{
    font-weight:600;line-height:1.6;margin-bottom:48px;
    font-size:clamp(.95rem,2.6vw,1.1rem);max-width:40ch;
  }
  .socials{display:flex;align-items:center;gap:20px}
  .social{
    display:flex;align-items:center;gap:10px;font-weight:900;font-style:italic;
    text-transform:uppercase;font-size:.78rem;letter-spacing:.12em;color:var(--ink);
    text-decoration:none;transition:color .2s;
  }
  .social:hover{color:var(--blue)}
  .social .icon{
    display:flex;align-items:center;justify-content:center;width:44px;height:44px;
    background:var(--blue);color:#fff;transition:background .2s;
    box-shadow:0 4px 8px rgba(10,46,79,.2);
    clip-path:polygon(8% 0,92% 0,100% 8%,100% 92%,92% 100%,8% 100%,0 92%,0 8%);
  }
  .social:hover .icon{background:var(--ink)}
  .sep{width:1px;height:24px;background:rgba(10,46,79,.2)}
  .copyright{
    margin-top:48px;font-weight:600;font-size:.72rem;text-transform:uppercase;
    letter-spacing:.14em;opacity:.5;
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
